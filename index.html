<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عُرب URB — Built for Games. Trained by Humans.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Tajawal:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05060f;
  --bg2:#080a18;
  --surface:#0b0e20;
  --surface2:#10142c;
  --surface3:#161b3a;
  --purple:#8b5cf6;
  --cyan:#22d3ee;
  --gold:#fbbf24;
  --red:#f87171;
  --green:#34d399;
  --text:#e8eaf6;
  --dim:#8a93b8;
  --border:rgba(139,92,246,0.18);
  --border2:rgba(255,255,255,0.07);
  --grad:linear-gradient(135deg,var(--purple) 0%,var(--cyan) 100%);
  --glow-p:0 0 40px rgba(139,92,246,0.25);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:'Tajawal',sans-serif;
  min-height:100vh;overflow-x:hidden;
}
[lang="en"] body, .ltr{font-family:'Space Grotesk','Tajawal',sans-serif}

/* LAYOUT & NAV */
.view{display:none;position:relative;z-index:1}
.view.active{display:block}

nav{
  position:sticky;top:0;z-index:90;
  background:rgba(5,6,15,0.75);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border2);
}
.nav-inner{max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.logo{display:flex;align-items:center;gap:10px;cursor:pointer}
.logo-mark{
  width:34px;height:34px;border-radius:10px;background:var(--grad);
  display:flex;align-items:center;justify-content:center;font-size:1.05rem;
}
.logo-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.25rem;}
.logo-name b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.nav-cta{display:flex;gap:10px;align-items:center}
.btn{border:none;cursor:pointer;font-family:inherit;border-radius:11px;font-weight:700;transition:all 0.22s;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
.btn-grad{background:var(--grad);color:#fff;padding:10px 22px;font-size:0.9rem}

/* LANG PICKER */
.lang-pick{position:relative}
.lang-btn{background:rgba(255,255,255,0.04);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:8px 14px;font-size:0.82rem;cursor:pointer;display:flex;gap:7px;align-items:center;font-family:inherit}
.lang-menu{position:absolute;top:110%;inset-inline-end:0;background:var(--surface2);border:1px solid var(--border);border-radius:13px;padding:6px;display:none;flex-direction:column;min-width:160px;z-index:100;max-height:300px;overflow-y:auto;}
.lang-menu.open{display:flex}
.lang-opt{background:none;border:none;color:var(--text);padding:9px 13px;border-radius:8px;cursor:pointer;text-align:start;font-size:0.85rem;font-family:inherit;display:flex;gap:9px;align-items:center}
.lang-opt:hover{background:var(--surface3)}

/* HERO & PRICING */
.hero{padding:90px 24px 60px;max-width:1200px;margin:0 auto;text-align:center;}
.hero h1{font-size:3rem;font-weight:700;margin-bottom:20px;}
.price-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;max-width:1200px;margin:0 auto;padding:40px 24px;}
.price-card{background:rgba(11,14,32,0.75);border:1px solid var(--border2);border-radius:22px;padding:34px 28px;display:flex;flex-direction:column;position:relative;}

/* MODALS */
.overlay{position:fixed;inset:0;background:rgba(3,4,10,0.82);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;padding:20px;}
.overlay.open{opacity:1;pointer-events:all}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:22px;width:580px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 40px 100px rgba(0,0,0,0.6);}
.panel-head{padding:19px 24px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:2;}
.panel-title{font-weight:700;font-size:1rem}
.x-btn{background:none;border:none;color:var(--dim);font-size:1.15rem;cursor:pointer;padding:4px 9px;}
.panel-body{padding:24px}

.fg{margin-bottom:16px}
.fl{display:block;font-family:'Space Mono',monospace;font-size:0.68rem;letter-spacing:1.2px;color:var(--dim);margin-bottom:7px}
.fi{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:11px;padding:12px 15px;color:var(--text);font-size:0.92rem;outline:none;}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fmsg{display:none;margin-top:12px;padding:11px 15px;border-radius:10px;font-size:0.83rem}
.fmsg.err{display:block;background:rgba(248,113,113,0.09);border:1px solid rgba(248,113,113,0.3);color:var(--red)}
.fmsg.ok{display:block;background:rgba(52,211,153,0.09);border:1px solid rgba(52,211,153,0.3);color:var(--green)}

/* DASHBOARDS */
.dash{display:none;min-height:100vh;}
.dash.active{display:flex;flex-direction:column}
.dash-top{position:sticky;top:0;z-index:80;background:rgba(5,6,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);padding:13px 22px;display:flex;align-items:center;justify-content:space-between;}
.dash-body{flex:1;display:flex;max-width:1400px;width:100%;margin:0 auto}
.dash-side{width:230px;flex-shrink:0;border-inline-end:1px solid var(--border2);padding:20px 14px;display:flex;flex-direction:column;gap:4px;}
.side-item{display:flex;align-items:center;gap:11px;padding:11px 15px;border-radius:11px;color:var(--dim);cursor:pointer;font-size:0.88rem;background:none;border:none;width:100%;text-align:start;}
.side-item.on{background:rgba(139,92,246,0.1);color:var(--text);border:1px solid var(--border)}
.dash-main{flex:1;padding:26px;min-width:0}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:26px}
.stat{background:rgba(11,14,32,0.75);border:1px solid var(--border2);border-radius:15px;padding:19px 20px;}
.stat .sl{font-family:'Space Mono',monospace;font-size:0.62rem;color:var(--dim);}
.stat .sv{font-family:'Space Mono',monospace;font-size:1.65rem;font-weight:700}

.dcard{background:rgba(11,14,32,0.75);border:1px solid var(--border2);border-radius:17px;overflow:hidden}
.dcard-head{padding:16px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;}
.dcard-body{padding:18px 20px}
.mini-btn{background:var(--surface3);border:1px solid var(--border2);color:#c3c9e3;padding:7px 13px;border-radius:9px;font-size:0.76rem;cursor:pointer;}
.mini-btn.mm{background:var(--grad);color:#fff;border:none;font-weight:700}

/* BOT */
.chat-widget-btn{position:fixed;bottom:20px;left:20px;background:linear-gradient(135deg,#6366f1,#a855f7);color:white;border:none;border-radius:50px;padding:12px 20px;font-weight:bold;cursor:pointer;z-index:99999;}
.chat-box{position:fixed;bottom:80px;left:20px;width:360px;height:500px;background:#131525;border:1px solid rgba(255,255,255,0.1);border-radius:16px;display:none;flex-direction:column;z-index:99999;color:#fff;}
.chat-header{background:#1a1d36;padding:16px;display:flex;justify-content:space-between;}
.chat-messages{flex:1;padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
.message{max-width:80%;padding:10px 14px;border-radius:12px;font-size:14px;}
.message.user{background:#6366f1;color:white;align-self:flex-start;}
.message.bot{background:#222643;color:#e2e8f0;align-self:flex-end;}
.chat-input-area{padding:12px;background:#1a1d36;display:flex;gap:8px;}
.chat-input{flex:1;background:#0b0d17;border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px;color:white;outline:none;}
.send-btn{background:linear-gradient(135deg,#6366f1,#a855f7);color:white;border:none;border-radius:8px;width:42px;cursor:pointer;}
</style>
</head>
<body>

<!-- LANDING VIEW -->
<div class="view active" id="view-landing">
<nav>
  <div class="nav-inner">
    <div class="logo">
      <div class="logo-mark">🎮</div>
      <div class="logo-name">عُرب <b>URB</b></div>
    </div>
    <div class="nav-cta">
      <div class="lang-pick">
        <button class="lang-btn" onclick="toggleLangMenu(event)"><span id="langFlag">🇸🇦</span> <span id="langName">العربية</span> ▾</button>
        <div class="lang-menu" id="langMenu"></div>
      </div>
      <button class="btn btn-grad" onclick="openAuth()" data-i18n="nav_login">🔐 دخول</button>
    </div>
  </div>
</nav>

<div class="hero">
  <h1><span data-i18n="hero_1">صُنعت للألعاب.</span> <span style="color:var(--cyan);" data-i18n="hero_2">دُرّبت بالبشر.</span></h1>
  <p data-i18n="hero_sub">منصة توطين ذكية تجمع قوة الذكاء الاصطناعي مع الدقة الثقافية السعودية.</p>
  <button class="btn btn-grad" onclick="openAuth('signup')" data-i18n="hero_cta1">🚀 أطلق حزمة جديدة</button>
</div>

<div class="price-grid" id="priceGrid"></div>
</div>

<!-- CLIENT DASHBOARD -->
<div class="dash" id="dash-client">
  <div class="dash-top">
    <div style="font-weight:700;"><span>URB</span> <span style="color:var(--cyan);">CLIENT</span></div>
    <div style="display:flex;gap:12px;align-items:center;">
      <div class="lang-pick">
        <button class="lang-btn" onclick="toggleLangMenu(event)"><span id="clLangFlag">🇸🇦</span> <span id="clLangName">العربية</span> ▾</button>
        <div class="lang-menu" id="clLangMenu"></div>
      </div>
      <span id="cl-name" style="font-size:0.82rem;color:var(--dim);"></span>
      <button class="mini-btn" onclick="doLogout()"><span data-i18n="btn_logout">خروج ↩</span></button>
    </div>
  </div>
  <div class="dash-body">
    <div class="dash-side">
      <button class="side-item on"><span data-i18n="dash_overview">📊 لوحتي</span></button>
      <button class="side-item" onclick="openCreatePkg()"><span data-i18n="dash_new_pkg">➕ حزمة جديدة</span></button>
    </div>
    <div class="dash-main">
      <div class="stats">
        <div class="stat"><div class="sl" data-i18n="st_pkgs">PACKAGES</div><div class="sv" id="cs-total">0</div></div>
        <div class="stat"><div class="sl" data-i18n="st_proc">IN PROGRESS</div><div class="sv" id="cs-proc">0</div></div>
        <div class="stat"><div class="sl" data-i18n="st_done">COMPLETED</div><div class="sv" id="cs-done">0</div></div>
        <div class="stat"><div class="sl" data-i18n="st_words">WORDS</div><div class="sv" id="cs-words">0</div></div>
      </div>
      <div class="dcard">
        <div class="dcard-head"><div style="font-weight:700;" data-i18n="recent_pkgs">📦 أحدث الحزم</div><button class="mini-btn mm" onclick="openCreatePkg()" data-i18n="dash_new_pkg">➕ حزمة جديدة</button></div>
        <div class="dcard-body" id="cl-recent"></div>
      </div>
    </div>
  </div>
</div>

<!-- AUTH MODAL -->
<div class="overlay" id="authModal">
  <div class="panel">
    <div class="panel-head"><div class="panel-title">🔐 <span data-i18n="auth_title">الدخول إلى عُرب URB</span></div><button class="x-btn" onclick="closeM('authModal')">✕</button></div>
    <div class="panel-body">
      <div class="fg"><label class="fl">EMAIL</label><input class="fi" type="email" id="li-email"></div>
      <div class="fg"><label class="fl">PASSWORD</label><input class="fi" type="password" id="li-pass"></div>
      <button class="btn btn-grad" style="width:100%;padding:13px;" onclick="doLogin()" data-i18n="tab_login">🔐 دخول</button>
      <div class="fmsg" id="auth-msg"></div>
    </div>
  </div>
</div>

<!-- CREATE PACKAGE MODAL (FULL 12 LANGUAGES SUPPORT) -->
<div class="overlay" id="pkgModal">
  <div class="panel" style="width:600px;">
    <div class="panel-head">
      <div class="panel-title">📦 <span data-i18n="modal_pkg_title">حزمة توطين جديدة</span></div>
      <button class="x-btn" onclick="closeM('pkgModal')">✕</button>
    </div>
    <div class="panel-body">
      <div class="fg">
        <label class="fl" data-i18n="fl_pkg_plan">PACKAGE PLAN</label>
        <select class="fi" id="np-plan">
          <option value="URB AI System">URB AI System</option>
          <option value="URB AI + Human Auditing">URB AI + Human Auditing</option>
          <option value="URB PLUS">URB PLUS</option>
        </select>
      </div>
      <div class="f2">
        <div class="fg">
          <label class="fl" data-i18n="fl_game_name">GAME NAME *</label>
          <input class="fi" id="np-name">
        </div>
        <div class="fg">
          <label class="fl" data-i18n="fl_game_engine">GAME ENGINE</label>
          <select class="fi" id="np-engine">
            <option value="">— Select Engine —</option>
            <option>Unity</option>
            <option>Unreal Engine</option>
            <option>Godot</option>
            <option>GameMaker</option>
            <option>Custom Engine</option>
          </select>
        </div>
      </div>
      <div class="fg">
        <label class="fl" data-i18n="fl_game_desc">GAME DESCRIPTION</label>
        <textarea class="fi" id="np-desc" rows="2"></textarea>
      </div>
      <div class="f2">
        <div class="fg">
          <label class="fl" data-i18n="fl_platforms">PLATFORMS</label>
          <input class="fi" id="np-platforms" placeholder="PC, PS5, Mobile">
        </div>
        <div class="fg">
          <label class="fl" data-i18n="fl_langs">TARGET LANGUAGES</label>
          <input class="fi" id="np-langs" placeholder="Arabic, Japanese...">
        </div>
      </div>
      <div class="f2">
        <div class="fg">
          <label class="fl" data-i18n="fl_words">ESTIMATED WORDS</label>
          <input class="fi" type="number" id="np-words">
        </div>
        <div class="fg">
          <label class="fl" data-i18n="fl_deadline">DEADLINE</label>
          <input class="fi" type="date" id="np-deadline">
        </div>
      </div>
      
      <!-- FILES LINK -->
      <div class="fg">
        <label class="fl" data-i18n="fl_files_link">FILES LINK (Google Drive / Dropbox / WeTransfer)</label>
        <input class="fi" id="np-filelink" placeholder="https://drive.google.com/..." style="direction:ltr;">
      </div>

      <div class="fg">
        <label class="fl" data-i18n="fl_notes">NOTES</label>
        <textarea class="fi" id="np-notes" rows="2"></textarea>
      </div>
      
      <button class="btn btn-grad" style="width:100%;padding:14px;" id="np-btn" onclick="submitPackage()" data-i18n="btn_submit_pkg">🚀 إرسال الحزمة</button>
      <div class="fmsg" id="np-msg"></div>
    </div>
  </div>
</div>

<!-- BOT -->
<button class="chat-widget-btn" onclick="toggleChat()">🤖 URB bot</button>
<div class="chat-box" id="chatBox">
  <div class="chat-header"><h3>🤖 URB bot</h3><button style="background:none;border:none;color:#fff;cursor:pointer;" onclick="toggleChat()">✕</button></div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-area">
    <input type="text" id="userInput" class="chat-input" placeholder="Ask something...">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

function t(k){ return T[k]?.[lang] || T[k]?.en || T[k]?.ar || ''; }

function applyLang() {
  const cfg = LANGS[lang] || LANGS.ar;
  document.documentElement.lang = lang;
  document.documentElement.dir = cfg.d || 'ltr';
  
  document.querySelectorAll('#langFlag, #clLangFlag').forEach(el => el.textContent = cfg.f);
  document.querySelectorAll('#langName, #clLangName').forEach(el => el.textContent = cfg.n);
  
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t(key)) el.innerHTML = t(key);
  });
  
  buildLangMenus();
}

function buildLangMenus() {
  const html = Object.entries(LANGS).map(([k, v]) => 
    `<button class="lang-opt ${k===lang?'on':''}" onclick="setLang('${k}')">${v.f} ${v.n}</button>`
  ).join('');
  document.querySelectorAll('#langMenu, #clLangMenu').forEach(m => m.innerHTML = html);
}

function setLang(k) {
  lang = k;
  localStorage.setItem('gl_lang', k);
  applyLang();
  document.querySelectorAll('.lang-menu').forEach(m => m.classList.remove('open'));
}

function toggleLangMenu(e) {
  e.stopPropagation();
  const menu = e.currentTarget.nextElementSibling;
  menu.classList.toggle('open');
}

function closeM(id){ document.getElementById(id).classList.remove('open'); }
function openM(id){ document.getElementById(id).classList.add('open'); }

function openCreatePkg(){
  if(!me){ openAuth(); return; }
  openM('pkgModal');
}

function openAuth(){ openM('authModal'); }

async function submitPackage(){
  const name = document.getElementById('np-name').value.trim();
  const fileLink = document.getElementById('np-filelink').value.trim();
  const msgEl = document.getElementById('np-msg');
  
  if(!name){ 
    msgEl.className = 'fmsg err'; 
    msgEl.textContent = (lang === 'ar') ? '⚠️ اسم اللعبة مطلوب' : '⚠️ Game name is required'; 
    return; 
  }

  const payload = {
    user_id: me.id, 
    game_name: name, 
    status: 'submitted',
    plan: document.getElementById('np-plan').value,
    description: document.getElementById('np-desc').value.trim() || null,
    links: fileLink || null,
    platforms: document.getElementById('np-platforms').value.trim() || null,
    target_langs: document.getElementById('np-langs').value.trim() || null,
    engine: document.getElementById('np-engine').value || null,
    est_words: Number(document.getElementById('np-words').value) || null,
    deadline: document.getElementById('np-deadline').value ? new Date(document.getElementById('np-deadline').value).toISOString() : null,
    notes: document.getElementById('np-notes').value.trim() || null
  };

  const { error } = await sb.from('packages').insert([payload]);
  
  if(error){ 
    msgEl.className = 'fmsg err'; 
    msgEl.textContent = error.message; 
  } else {
    msgEl.className = 'fmsg ok'; 
    msgEl.textContent = (lang === 'ar') ? '✓ تم إرسال الحزمة بنجاح!' : '✓ Package submitted successfully!';
    setTimeout(() => { closeM('pkgModal'); location.reload(); }, 1500);
  }
}

async function doLogin(){
  const email = document.getElementById('li-email').value.trim();
  const pass = document.getElementById('li-pass').value;
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if(!error) closeM('authModal');
}

async function doLogout(){
  await sb.auth.signOut();
  document.getElementById('dash-client').classList.remove('active');
  document.getElementById('view-landing').classList.add('active');
}

sb.auth.onAuthStateChange((ev, session)=>{
  if(session?.user) {
    me = session.user;
    document.getElementById('view-landing').classList.remove('active');
    document.getElementById('dash-client').classList.add('active');
    document.getElementById('cl-name').textContent = me.user_metadata?.full_name || me.email;
    applyLang();
  }
});

function toggleChat() {
  const box = document.getElementById('chatBox');
  box.style.display = (box.style.display === 'flex') ? 'none' : 'flex';
}

// Init
applyLang();
