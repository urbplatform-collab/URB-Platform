<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URB Platform - عُرب</title>
  <style>
    /* التنسيقات العامة للشات والموقع */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #0b0d17;
      color: #fff;
    }

    /* زر فتح الشات العائم */
    .chat-widget-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
      z-index: 1000;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chat-widget-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(99, 102, 241, 0.6);
    }

    /* نافذة الشات */
    .chat-box {
      position: fixed;
      bottom: 80px;
      left: 20px;
      width: 360px;
      max-width: 90vw;
      height: 500px;
      background: #131525;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      display: none;
      flex-direction: column;
      z-index: 1000;
      overflow: hidden;
    }

    .chat-header {
      background: #1a1d36;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .chat-header h3 {
      margin: 0;
      font-size: 16px;
      color: #fff;
    }

    .close-btn {
      background: none;
      border: none;
      color: #a0a5ba;
      font-size: 20px;
      cursor: pointer;
    }

    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* أزرار اختيار اللغات والأعلام */
    .lang-container {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .lang-title {
      font-size: 12px;
      color: #a0a5ba;
      margin-bottom: 10px;
    }

    .lang-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .lang-btn {
      background: #222643;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: 0.2s;
    }

    .lang-btn:hover {
      background: #6366f1;
      border-color: #6366f1;
    }

    /* الرسائل */
    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .message.user {
      background: #6366f1;
      color: white;
      align-self: flex-start;
      border-bottom-left-radius: 2px;
    }

    .message.bot {
      background: #222643;
      color: #e2e8f0;
      align-self: flex-end;
      border-bottom-right-radius: 2px;
    }

    /* منطقة الإدخال */
    .chat-input-area {
      padding: 12px;
      background: #1a1d36;
      display: flex;
      gap: 8px;
    }

    .chat-input {
      flex: 1;
      background: #0b0d17;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px 12px;
      color: white;
      outline: none;
      font-size: 14px;
    }

    .send-btn {
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 16px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- زر الفتح العائم -->
  <button class="chat-widget-btn" onclick="toggleChat()">
    <span>💬</span> المساعد الذكي
  </button>

  <!-- نافذة الشات -->
  <div class="chat-box" id="chatBox">
    <div class="chat-header">
      <h3>مساعد عُرب URB 🤖</h3>
      <button class="close-btn" onclick="toggleChat()">✕</button>
    </div>

    <div class="chat-messages" id="chatMessages">
      <!-- أزرار اختيار اللغات عند الفتح -->
      <div class="lang-container" id="langContainer">
        <div class="lang-title">اختر لغتك المفضلـة / Choose Language</div>
        <div class="lang-buttons">
          <button class="lang-btn" onclick="setLanguage('العربية (لهجة سعودية)', '🇸🇦 العربية')">🇸🇦 العربية</button>
          <button class="lang-btn" onclick="setLanguage('English', '🇺🇸 English')">🇺🇸 English</button>
          <button class="lang-btn" onclick="setLanguage('Japanese', '🇯🇵 日本語')">🇯🇵 日本語</button>
          <button class="lang-btn" onclick="setLanguage('Spanish', '🇪🇸 Español')">🇪🇸 Español</button>
        </div>
      </div>
    </div>

    <div class="chat-input-area">
      <input type="text" id="userInput" class="chat-input" placeholder="اكتب سؤالك هنا..." onkeypress="handleKeyPress(event)">
      <button class="send-btn" onclick="sendMessage()">إرسال</button>
    </div>
  </div>

  <script>
    let selectedLang = 'auto';

    function toggleChat() {
      const box = document.getElementById('chatBox');
      box.style.display = (box.style.display === 'flex') ? 'none' : 'flex';
    }

    function setLanguage(langCode, langName) {
      selectedLang = langCode;
      document.getElementById('langContainer').style.display = 'none';
      appendMessage('bot', `تم اختيار اللغة: ${langName} ✨ كيف أقدر أساعدك اليوم في منصة عُرب؟`);
    }

    function appendMessage(sender, text) {
      const messagesDiv = document.getElementById('chatMessages');
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${sender}`;
      msgDiv.innerText = text;
      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      appendMessage('user', text);
      input.value = '';

      // رسالة مؤقتة للانتظار
      const loadingDiv = document.createElement('div');
      loadingDiv.className = 'message bot';
      loadingDiv.id = 'loadingMsg';
      loadingDiv.innerText = 'جاري التفكير... ⏳';
      document.getElementById('chatMessages').appendChild(loadingDiv);

      try {
        const response = await fetch('/.netlify/functions/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: text,
            language: selectedLang
          })
        });

        const data = await response.json();
        
        // حذف رسالة الانتظار
        document.getElementById('loadingMsg')?.remove();
        
        // عرض الرد
        appendMessage('bot', data.reply || 'لم يتم استلام رد.');
      } catch (err) {
        document.getElementById('loadingMsg')?.remove();
        appendMessage('bot', 'عذراً، حدث خطأ في الاتصال بالسيرفر.');
      }
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter') sendMessage();
    }
  </script>
</body>
</html>
